<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Transmisión Clonada</title>
    <!-- Cargamos la librería Hls.js para poder reproducir flujos en vivo .m3u8 -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: sans-serif;
        }
        .contenedor {
            width: 100%;
            max-width: 850px;
            padding: 10px;
            box-sizing: border-box;
            text-align: center;
        }
        h1 {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        video { 
            width: 100%; 
            height: auto; 
            border: 2px solid #222; 
            border-radius: 8px;
            box-shadow: 0px 4px 20px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>Reproductor de Video en GitHub Pages</h1>
        <!-- El reproductor nativo con controles de volumen y pantalla completa -->
        <video id="reproductor" controls autoplay muted></video>
    </div>

    <script>
        // REEMPLAZA EL TEXTO ENTRE LAS COMILLAS POR TU ENLACE COPIADO CON F12
        const urlTransmision = "https://m2.domain990.sbs/global/foxdeportes/index.m3u8?token=023dd9ba92c1b31485f86fb36459f0120050e46f-5a-1784828837-1784774837&ip=187.246.2.44";

        const video = document.getElementById('reproductor');

        // Lógica técnica para activar el flujo de video en el navegador
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(urlTransmision);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Compatibilidad directa para dispositivos Apple (Safari/iOS)
            video.src = urlTransmision;
        }
    </script>

</body>
</html>
