<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Mario JS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #111;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 1.8rem;
      color: #ffcc00;
    }

    p {
      margin-bottom: 15px;
      color: #aaa;
      font-size: 0.95rem;
    }

    canvas {
      border: 4px solid #fff;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      background-color: #5c94fc; /* Azul cielo estilo Mario */
    }
  </style>
</head>
<body>

  <h1>MINI PLATAFORMAS JS</h1>
  <p>Controles: Flechas ⬅️ ➡️ o A/D para moverte | Espacio o ⬆️ para saltar</p>
  
  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- TECLADO ---
    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // --- JUGADOR (Estilo Mario) ---
    const player = {
      x: 50,
      y: 300,
      width: 30,
      height: 40,
      color: '#e52521', // Rojo Mario
      vx: 0,
      vy: 0,
      speed: 5,
      gravity: 0.6,
      jumpForce: -12,
      grounded: false,
      score: 0
    };

    // --- ESCENARIO (Plataformas) ---
    const platforms = [
      { x: 0, y: 360, width: 800, height: 40, color: '#00a800' },   // Suelo principal
      { x: 200, y: 270, width: 120, height: 20, color: '#b84418' }, // Bloque flotante 1
      { x: 400, y: 200, width: 140, height: 20, color: '#b84418' }, // Bloque flotante 2
      { x: 600, y: 270, width: 100, height: 20, color: '#b84418' }  // Bloque flotante 3
    ];

    // --- MONEDAS ---
    const coins = [
      { x: 240, y: 230, radius: 8, collected: false },
      { x: 460, y: 160, radius: 8, collected: false },
      { x: 640, y: 230, radius: 8, collected: false }
    ];

    // --- BUCLE PRINCIPAL DEL JUEGO ---
    function update() {
      // Movimiento horizontal
      if (keys['ArrowRight'] || keys['KeyD']) {
        player.vx = player.speed;
      } else if (keys['ArrowLeft'] || keys['KeyA']) {
        player.vx = -player.speed;
      } else {
        player.vx = 0;
      }

      // Salto
      if ((keys['Space'] || keys['ArrowUp'] || keys['KeyW']) && player.grounded) {
        player.vy = player.jumpForce;
        player.grounded = false;
      }

      // Aplicar gravedad
      player.vy += player.gravity;

      // Actualizar posición
      player.x += player.vx;
      player.y += player.vy;

      // Límites de la pantalla (Izquierda / Derecha)
      if (player.x < 0) player.x = 0;
      if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

      // Colisión con Plataformas
      player.grounded = false;
      platforms.forEach(plat => {
        if (
          player.x < plat.x + plat.width &&
          player.x + player.width > plat.x &&
          player.y + player.height >= plat.y &&
          player.y + player.height <= plat.y + plat.height + player.vy
        ) {
          player.y = plat.y - player.height;
          player.vy = 0;
          player.grounded = true;
        }
      });

      // Recolección de Monedas
      coins.forEach(coin => {
        if (!coin.collected) {
          let dx = (player.x + player.width / 2) - coin.x;
          let dy = (player.y + player.height / 2) - coin.y;
          let distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < player.width / 2 + coin.radius) {
            coin.collected = true;
            player.score += 100;
          }
        }
      });
    }

    // --- RENDERIZADO GRÁFICO ---
    function draw() {
      // Limpiar fondo
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Dibujar Plataformas
      platforms.forEach(plat => {
        ctx.fillStyle = plat.color;
        ctx.fillRect(plat.x, plat.y, plat.width, plat.height);
      });

      // Dibujar Monedas
      coins.forEach(coin => {
        if (!coin.collected) {
          ctx.fillStyle = '#ffcc00';
          ctx.beginPath();
          ctx.arc(coin.x, coin.y, coin.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      });

      // Dibujar Jugador
      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y, player.width, player.height);

      // Gorra de Mario (Detalle estético)
      ctx.fillStyle = '#990000';
      ctx.fillRect(player.x + 5, player.y, player.width, 8);

      // Mostrar Marcador
      ctx.fillStyle = '#ffffff';
      ctx.font = '20px sans-serif';
      ctx.fillText(`Puntos: ${player.score}`, 20, 35);
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    // Iniciar el juego
    gameLoop();
  </script>
</body>
</html>
