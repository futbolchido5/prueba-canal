<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Física e Impulso 2D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background-color: #0b0c10;
      color: #ffffff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Panel de Control Superior */
    .hud {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 10;
      background: rgba(22, 27, 34, 0.85);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .hud-title {
      font-weight: 700;
      color: #00ffcc;
      font-size: 0.95rem;
    }

    .hud-stats {
      font-size: 0.85rem;
      color: #a0a5c0;
    }

    .btn-clear {
      background: #ff3366;
      color: #fff;
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.8rem;
      transition: background 0.2s ease;
    }

    .btn-clear:hover {
      background: #e02452;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
      cursor: crosshair;
    }
  </style>
</head>
<body>

  <!-- Panel informativo flotante -->
  <div class="hud">
    <div class="hud-title">⚡ SIMULADOR FÍSICO 2D</div>
    <div class="hud-stats" id="stats">Pelotas: 0</div>
    <button class="btn-clear" id="btnClear">Limpiar Pantalla</button>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const stats = document.getElementById('stats');
    const btnClear = document.getElementById('btnClear');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // --- CONFIGURACIÓN DE FÍSICA ---
    const gravity = 0.35;
    const friction = 0.985; // Fricción con el aire
    const bounce = 0.75;    // Elasticidad del suelo y paredes

    const balls = [];

    // Estado del Mouse para Lanzamiento
    const mouse = {
      isDown: false,
      startX: 0,
      startY: 0,
      currentX: 0,
      currentY: 0
    };

    // --- CLASE PELOTA ---
    class Ball {
      constructor(x, y, vx, vy, radius) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.radius = radius;
        this.mass = radius; // La masa es proporcional al tamaño
        this.color = `hsl(${Math.random() * 360}, 80%, 60%)`;
      }

      update() {
        // Gravedad
        this.vy += gravity;

        // Fricción ambiental
        this.vx *= friction;
        this.vy *= friction;

        // Actualización de posición
        this.x += this.vx;
        this.y += this.vy;

        // Colisión con los bordes del Canvas
        if (this.x - this.radius < 0) {
          this.x = this.radius;
          this.vx *= -bounce;
        } else if (this.x + this.radius > canvas.width) {
          this.x = canvas.width - this.radius;
          this.vx *= -bounce;
        }

        if (this.y - this.radius < 0) {
          this.y = this.radius;
          this.vy *= -bounce;
        } else if (this.y + this.radius > canvas.height) {
          this.y = canvas.height - this.radius;
          this.vy *= -bounce;
        }
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 10;
        ctx.fill();
        ctx.shadowBlur = 0; // Desactivar sombra para rendimiento
        ctx.closePath();
      }
    }

    // --- DETECCIÓN DE COLISIONES ENTRE PELOTAS (Física Elástica 2D) ---
    function resolveCollisions() {
      for (let i = 0; i < balls.length; i++) {
        for (let j = i + 1; j < balls.length; j++) {
          let b1 = balls[i];
          let b2 = balls[j];

          let dx = b2.x - b1.x;
          let dy = b2.y - b1.y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          let minDist = b1.radius + b2.radius;

          if (distance < minDist) {
            // Separación para evitar colape o atascamiento
            let overlap = minDist - distance;
            let nx = dx / distance;
            let ny = dy / distance;

            b1.x -= nx * overlap * 0.5;
            b1.y -= ny * overlap * 0.5;
            b2.x += nx * overlap * 0.5;
            b2.y += ny * overlap * 0.5;

            // Transferencia de Impulso y Conservación de Movimiento
            let kx = b1.vx - b2.vx;
            let ky = b1.vy - b2.vy;
            let p = 2 * (nx * kx + ny * ky) / (b1.mass + b2.mass);

            b1.vx -= p * b2.mass * nx;
            b1.vy -= p * b2.mass * ny;
            b2.vx += p * b1.mass * nx;
            b2.vy += p * b1.mass * ny;
          }
        }
      }
    }

    // --- INTERACCIÓN DE LANZAMIENTO (MOUSE) ---
    canvas.addEventListener('mousedown', (e) => {
      mouse.isDown = true;
      mouse.startX = e.clientX;
      mouse.startY = e.clientY;
      mouse.currentX = e.clientX;
      mouse.currentY = e.clientY;
    });

    canvas.addEventListener('mousemove', (e) => {
      if (mouse.isDown) {
        mouse.currentX = e.clientX;
        mouse.currentY = e.clientY;
      }
    });

    canvas.addEventListener('mouseup', (e) => {
      if (mouse.isDown) {
        mouse.isDown = false;
        
        // Calcular vector de fuerza según el arrastre
        let vx = (mouse.startX - e.clientX) * 0.15;
        let vy = (mouse.startY - e.clientY) * 0.15;
        let radius = Math.random() * 15 + 15; // Tamaño aleatorio

        balls.push(new Ball(mouse.startX, mouse.startY, vx, vy, radius));
        stats.innerText = `Pelotas: ${balls.length}`;
      }
    });

    // Limpiar pantalla
    btnClear.addEventListener('click', () => {
      balls.length = 0;
      stats.innerText = `Pelotas: 0`;
    });

    // --- BUCLE PRINCIPAL DE ANIMACIÓN ---
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Dibujar vector/honda de tiro mientras se arrastra el mouse
      if (mouse.isDown) {
        ctx.beginPath();
        ctx.moveTo(mouse.startX, mouse.startY);
        ctx.lineTo(mouse.currentX, mouse.currentY);
        ctx.strokeStyle = '#00ffcc';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Círculo guía
        ctx.beginPath();
        ctx.arc(mouse.startX, mouse.startY, 15, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 255, 204, 0.4)';
        ctx.fill();
      }

      // Actualizar física y dibujar objetos
      resolveCollisions();
      balls.forEach(ball => {
        ball.update();
        ball.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
