<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Motor de Efectos Visuales - Túnel 3D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background-color: #05050a;
      color: #ffffff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Panel de Control Flotante */
    .hud {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 10;
      background: rgba(15, 15, 25, 0.85);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .hud-title {
      font-weight: 700;
      color: #00ffcc;
      font-size: 0.95rem;
      letter-spacing: 1px;
    }

    .hud-instructions {
      font-size: 0.85rem;
      color: #a0a5c0;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>

  <div class="hud">
    <div class="hud-title">🚀 TÚNEL DE HIPERVELOCIDAD 3D</div>
    <div class="hud-instructions">Mueve el mouse para dirigir el túnel</div>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // --- PARÁMETROS DEL TÚNEL 3D ---
    const ringCount = 25;       // Cantidad de anillos de profundidad
    const sides = 8;            // Geometría del túnel (Octágono)
    const tunnelRadius = 300;   // Ancho del túnel
    let speed = 4;              // Velocidad de avance

    // Control de perspectiva del Mouse
    const targetMouse = { x: 0, y: 0 };
    const currentMouse = { x: 0, y: 0 };

    window.addEventListener('mousemove', (e) => {
      // Normalizar coordenadas del mouse de -1 a 1 desde el centro
      targetMouse.x = (e.clientX - canvas.width / 2) / (canvas.width / 2);
      targetMouse.y = (e.clientY - canvas.height / 2) / (canvas.height / 2);
    });

    // Crear la estructura de anillos en el eje Z (profundidad)
    const rings = [];
    for (let i = 0; i < ringCount; i++) {
      rings.push({
        z: i * 80, // Distancia entre cada anillo
        rot: i * 0.05 // Rotación inicial
      });
    }

    // --- PROYECCIÓN MATEMÁTICA 3D A 2D ---
    function project3D(x, y, z, fov = 350) {
      const scale = fov / (fov + z);
      return {
        x: x * scale + canvas.width / 2 + currentMouse.x * (scale * 200),
        y: y * scale + canvas.height / 2 + currentMouse.y * (scale * 200),
        scale: scale
      };
    }

    // --- BUCLE PRINCIPAL ---
    let frame = 0;
    function animate() {
      frame++;

      // Limpiar fondo con estela progresiva (Motion Blur)
      ctx.fillStyle = 'rgba(5, 5, 10, 0.25)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Suavizado del movimiento de cámara
      currentMouse.x += (targetMouse.x - currentMouse.x) * 0.05;
      currentMouse.y += (targetMouse.y - currentMouse.y) * 0.05;

      // Ordenar y renderizar anillos desde el fondo hacia el frente
      rings.sort((a, b) => b.z - a.z);

      for (let i = 0; i < rings.length; i++) {
        const ring = rings[i];

        // Mover el anillo hacia la cámara en Z
        ring.z -= speed;
        ring.rot += 0.005; // Rotación helicoidal constante

        // Si el anillo traspasa la cámara, lo mandamos al fondo
        if (ring.z <= -300) {
          ring.z += ringCount * 80;
        }

        // Calcular los vértices del polígono
        const points = [];
        for (let j = 0; j < sides; j++) {
          const angle = (j / sides) * Math.PI * 2 + ring.rot;
          const x3d = Math.cos(angle) * tunnelRadius;
          const y3d = Math.sin(angle) * tunnelRadius;

          const p2d = project3D(x3d, y3d, ring.z);
          points.push(p2d);
        }

        // Color cian/neón basado en la profundidad (Z)
        const depthAlpha = Math.max(0, 1 - ring.z / (ringCount * 80));
        const hue = (frame * 0.5 + ring.z * 0.2) % 360;

        ctx.strokeStyle = `hsla(${hue}, 100%, 60%, ${depthAlpha})`;
        ctx.lineWidth = Math.max(1, 4 * points[0].scale);

        // Dibujar anillo
        ctx.beginPath();
        for (let j = 0; j < sides; j++) {
          const next = (j + 1) % sides;
          ctx.moveTo(points[j].x, points[j].y);
          ctx.lineTo(points[next].x, points[next].y);
        }
        ctx.stroke();

        // Dibujar líneas longitudinales para conectar la red 3D
        if (i < rings.length - 1) {
          const nextRing = rings[i + 1];
          ctx.strokeStyle = `hsla(${hue}, 100%, 50%, ${depthAlpha * 0.3})`;
          ctx.lineWidth = 1;

          for (let j = 0; j < sides; j++) {
            const angleNext = (j / sides) * Math.PI * 2 + nextRing.rot;
            const pNext = project3D(
              Math.cos(angleNext) * tunnelRadius,
              Math.sin(angleNext) * tunnelRadius,
              nextRing.z
            );

            ctx.beginPath();
            ctx.moveTo(points[j].x, points[j].y);
            ctx.lineTo(pNext.x, pNext.y);
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
