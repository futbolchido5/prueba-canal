<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Canal de Prueba</title>
    <!-- Cargamos el reproductor de video -->
    <script src="https://cdn.jsdelivr.net/npm/@clappr/player@latest/dist/clappr.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 30px;
        }
        #player {
            margin: 20px auto;
            max-width: 720px;
        }
    </style>
</head>
<body>

    <h1>Mi Streaming de Prueba</h1>
    <p>Reproduciendo señal de demostración en vivo:</p>

    <!-- Aquí va el reproductor -->
    <div id="player"></div>

    <script>
        var player = new Clappr.Player({
            // URL de video HLS de prueba pública y legal
            source: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", 
            parentId: "#player",
            autoPlay: true,
            width: "100%",
            height: "400px"
        });
    </script>

</body>
</html>
