<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Terreno Procedural 2D</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    body {
      background-color: #0d1117;
      color: #ffffff;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Controles superiores */
    .hud {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 10;
      background: rgba(22, 27, 34, 0.85);
      backdrop-filter: blur(8px);
      padding: 12px 20px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .hud-title {
      font-weight: 700;
      color: #00ffcc;
      font-size: 0.95rem;
    }

    .btn-gen {
      background: linear-gradient(135deg, #00ffcc 0%, #00b8ff 100%);
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.85rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-gen:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0, 255, 204, 0.4);
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>

  <div class="hud">
    <div class="hud-title">🏞️ TERRENO PROCEDURAL</div>
    <button class="btn-gen" id="btnRegenerate">Generar Nuevo Mapa</button>
  </div>

  <canvas id="canvas"></canvas>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const btnRegenerate = document.getElementById('btnRegenerate');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      generateTerrain();
    }
    window.addEventListener('resize', resize);

    // --- ALGORITMO DE RUIDO 1D (Simulación de Perlin Noise) ---
    // Genera transiciones suaves entre alturas aleatorias
    let seed = Math.random();

    function pseudoRandom(x) {
      const sin = Math.sin(x * 12.9898 + seed * 78.233) * 43758.5453;
      return sin - Math.floor(sin);
    }

    function interpolatedNoise(x) {
      const integerX = Math.floor(x);
      const fractionalX = x - integerX;

      // Valores aleatorios en los puntos enteros
      const v1 = pseudoRandom(integerX);
      const v2 = pseudoRandom(integerX + 1);

      // Suavizado mediante interpolación cosenoidal
      const ft = fractionalX * Math.PI;
      const f = (1 - Math.cos(ft)) * 0.5;

      return v1 * (1 - f) + v2 * f;
    }

    function getTerrainHeight(x) {
      // Suma de múltiples octavas para agregar detalle (montañas + colinas + rocas)
      let height = 0;
      height += interpolatedNoise(x * 0.002) * 220; // Montañas grandes
      height += interpolatedNoise(x * 0.008) * 80;  // Colinas medianas
      height += interpolatedNoise(x * 0.03) * 15;    // Detalles pequeños

      return height;
    }

    // --- DIBUJO DEL TERRENO Y EL CIELO ---
    function generateTerrain() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 1. Degradado del Cielo (Atardecer/Noche)
      const skyGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
      skyGradient.addColorStop(0, '#0d1117');
      skyGradient.addColorStop(0.6, '#161b22');
      skyGradient.addColorStop(1, '#21262d');
      ctx.fillStyle = skyGradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 2. Sol en el fondo
      ctx.beginPath();
      ctx.arc(canvas.width * 0.75, canvas.height * 0.3, 60, 0, Math.PI * 2);
      ctx.fillStyle = '#ffcc00';
      ctx.shadowColor = '#ff9900';
      ctx.shadowBlur = 40;
      ctx.fill();
      ctx.shadowBlur = 0;

      // 3. Capa de Capas de Montañas Lejanas (Paralaje/Profundidad)
      drawMountainLayer(0.001, canvas.height * 0.55, '#1f2430', 120);
      
      // 4. Capa Principal del Terreno
      const groundBase = canvas.height * 0.65;
      
      ctx.beginPath();
      ctx.moveTo(0, canvas.height);

      for (let x = 0; x <= canvas.width; x += 2) {
        const y = groundBase - getTerrainHeight(x);
        ctx.lineTo(x, y);
      }

      ctx.lineTo(canvas.width, canvas.height);
      ctx.closePath();

      // Degradado de Tierra / Pasto
      const terrainGradient = ctx.createLinearGradient(0, groundBase - 250, 0, canvas.height);
      terrainGradient.addColorStop(0, '#2ea043'); // Pasto verde en la superficie
      terrainGradient.addColorStop(0.15, '#8b4513'); // Tierra marrón
      terrainGradient.addColorStop(1, '#0d1117');    // Oscuridad en las profundidades

      ctx.fillStyle = terrainGradient;
      ctx.fill();
    }

    // Dibujar montañas secundarias en el fondo
    function drawMountainLayer(freq, baseHeight, color, amplitude) {
      ctx.beginPath();
      ctx.moveTo(0, canvas.height);

      for (let x = 0; x <= canvas.width; x += 4) {
        const y = baseHeight - (interpolatedNoise(x * freq + 500) * amplitude);
        ctx.lineTo(x, y);
      }

      ctx.lineTo(canvas.width, canvas.height);
      ctx.closePath();
      ctx.fillStyle = color;
      ctx.fill();
    }

    // Botón para cambiar la semilla y regenerar
    btnRegenerate.addEventListener('click', () => {
      seed = Math.random();
      generateTerrain();
    });

    // Iniciar
    resize();
  </script>
</body>
</html>
