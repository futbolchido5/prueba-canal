<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba de Transmisión en GitHub</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { margin: 0; background-color: #111; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        .contenedor { width: 100%; max-width: 750px; padding: 20px; text-align: center; background: #222; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00ff88; font-size: 1.4rem; margin-bottom: 20px; }
        video { width: 100%; height: auto; border-radius: 6px; background: #000; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h1>¡Transmisión en Vivo Funcionando en GitHub!</h1>
        <video id="reproductor" controls autoplay muted></video>
    </div>

    <script>
        // Este es un enlace de transmisión HLS (.m3u8) público y libre de bloqueos
        const urlTransmision = "https://akamaihd.net";

        const video = document.getElementById('reproductor');

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(urlTransmision);
            hls.attachMedia(video);
            hls.on(Hls.Events.MANIFEST_PARSED, function() {
                video.play();
            });
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = urlTransmision;
        }
    </script>

</body>
</html>
